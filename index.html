<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Linu</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
            background:#F8F2EA;
            color:#4B4037;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:30px;
        }

        .card{
            background:white;
            max-width:500px;
            width:100%;
            padding:50px 40px;
            border-radius:24px;
            box-shadow:0 15px 40px rgba(0,0,0,.08);
            text-align:center;
        }

        h1{
            font-size:42px;
            margin-bottom:10px;
        }

        p{
            color:#7A6E65;
            margin-bottom:40px;
            line-height:1.6;
        }

        .button{
            display:block;
            width:100%;
            padding:18px;
            margin-bottom:18px;
            border-radius:14px;
            background:#E6B88A;
            color:white;
            text-decoration:none;
            font-size:18px;
            font-weight:600;
            transition:.25s;
        }

        .button:hover{
            background:#DCA56F;
            transform:translateY(-2px);
        }

        footer{
            margin-top:35px;
            font-size:14px;
            color:#9A8D83;
        }
    </style>

</head>
<body>

<div class="card">

    <h1>little Linu - Baby Planner </h1>

    <p>
        Willkommen auf der Informationsseite von Little Linu.
        Hier findest du unsere Datenschutzerklärung.
    </p>

    <a class="button" href="privacy.html">
        🇩🇪 Datenschutzerklärung
    </a>

    <a class="button" href="privacy-en.html">

    </a>

    <footer>
        © 2025 Little Linu
    </footer>

</div>

</html>
